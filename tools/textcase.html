<div class="page tool-page-wide">

    <div class="card" style="flex:1; min-width:0;">
      <div class="section-head">Input</div>
      <textarea class="field textarea tool-textarea" id="tcInput" placeholder="Paste or type your text here..."></textarea>
      <div class="char-count" id="tcCount">0 characters</div>
  
      <div class="rule"></div>
  
      <div class="section-head">Convert to</div>
      <div class="case-grid">
        <button class="case-btn" data-case="upper">
          <span>UPPERCASE</span>
          <span class="case-example">HELLO WORLD</span>
        </button>
        <button class="case-btn" data-case="lower">
          <span>lowercase</span>
          <span class="case-example">hello world</span>
        </button>
        <button class="case-btn" data-case="title">
          <span>Title Case</span>
          <span class="case-example">Hello World</span>
        </button>
        <button class="case-btn" data-case="sentence">
          <span>Sentence case</span>
          <span class="case-example">Hello world</span>
        </button>
        <button class="case-btn" data-case="camel">
          <span>camelCase</span>
          <span class="case-example">helloWorld</span>
        </button>
        <button class="case-btn" data-case="pascal">
          <span>PascalCase</span>
          <span class="case-example">HelloWorld</span>
        </button>
        <button class="case-btn" data-case="snake">
          <span>snake_case</span>
          <span class="case-example">hello_world</span>
        </button>
        <button class="case-btn" data-case="kebab">
          <span>kebab-case</span>
          <span class="case-example">hello-world</span>
        </button>
      </div>
    </div>
  
    <div class="card" style="flex:1; min-width:0;">
      <div class="section-head">Output</div>
      <textarea class="field textarea tool-textarea output-area" id="tcOutput" readonly placeholder="Result will appear here..."></textarea>
  
      <div class="rule"></div>
  
      <div class="stats-row" id="tcStats">
        <div class="stat"><span class="stat-val" id="statChars">0</span><span class="stat-label">Characters</span></div>
        <div class="stat"><span class="stat-val" id="statWords">0</span><span class="stat-label">Words</span></div>
        <div class="stat"><span class="stat-val" id="statLines">0</span><span class="stat-label">Lines</span></div>
      </div>
  
      <div class="output-actions">
        <button class="btn-action btn-copy" onclick="tcCopy()">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <rect x="4" y="4" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
            <path d="M2 11V2h9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          Copy result
        </button>
        <button class="btn-action btn-download" onclick="tcClear()">Clear</button>
      </div>
    </div>
  
    <div class="copy-toast" id="tcToast">Copied!</div>
  </div>
