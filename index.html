<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="shell">

  <div class="topbar">
    <img src="images/QRlogo.png" alt="QR Studio logo" class="brand-logo" />
    <div class="brand-name">
      <span class="brand-title">QR Generator</span>
      <span class="brand-sub">Create & customize your QR codes</span>
    </div>
  </div>

  <nav class="toolnav">
    <button class="toolnav-item active" data-tool="qr">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
        <rect x="1" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/>
        <rect x="9" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/>
        <rect x="1" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/>
        <rect x="9" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/>
      </svg>
      QR Generator
    </button>
    <button class="toolnav-item" data-tool="textcase">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
        <path d="M2 11L5.5 3 9 11M3.5 8.5h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M10.5 6c1.5 0 2.5.8 2.5 2s-1 2-2.5 2H9V6h1.5Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
      </svg>
      Text Case
    </button>
    <button class="toolnav-item" data-tool="markdown">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
        <rect x="1" y="2" width="13" height="11" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
        <path d="M3.5 9.5V5.5l2 2.5 2-2.5v4M10 9.5l1.5-4 1.5 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Markdown
    </button>
    <button class="toolnav-item" data-tool="jsonformat">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
        <path d="M5 2C3.5 2 3 2.8 3 4v2c0 1-.5 1.5-1.5 1.5C2.5 7.5 3 8 3 9v2c0 1.2.5 2 2 2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        <path d="M10 2c1.5 0 2 .8 2 2v2c0 1 .5 1.5 1.5 1.5C12.5 7.5 12 8 12 9v2c0 1.2-.5 2-2 2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      JSON
    </button>
    <button class="toolnav-item" data-tool="urlcodec">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
        <path d="M6 5H4a3 3 0 0 0 0 6h2M9 5h2a3 3 0 0 1 0 6H9M5 7.5h5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      URL Codec
    </button>
  </nav>

  <div id="tool-container"></div>

</div>

<script src="app.js"></script>
</body>
</html>
